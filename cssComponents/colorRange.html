<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</head>
<style>
    .card{
     box-shadow: 3px 4px 5px #1d1d1d44,
     inset 1px 2px 3px #1d1d1d77;   
     transform: translate(50%,50%);
    }
</style>
<body>
<div class="card position-absolute bottom-50 end-50" style="width: 18rem;">
  <div class="card-body">
    <label for="rRed" class="form-label">Red</label>
<input type="range" value="0" min="0" max="255" class="form-range" id="rRed">
<label for="rGreen" class="form-label">Green</label>
<input type="range" value="0" min="0" max="255" class="form-range" id="rGreen">
<label for="rBlue" class="form-label">Blue</label>
<input type="range" value="0" min="0" max="255" class="form-range" id="rBlue">
  </div>
  <div class="card-footer">
    rgb(0,0,0)
  </div>
</div>
</body>
<script>
    $=(x)=>document.querySelector(x)
    hexer="0123456789abcdef".split("")
    document.querySelectorAll("input").forEach(input=>
        input.addEventListener("change",(change=>{
            [red,green,blue]=[$("#rRed").value,$("#rGreen").value,$("#rBlue").value]
            $(".card-footer").textContent=`rgb(${red},${green},${blue})`
            document.body.style.backgroundColor=`rgb(${red},${green},${blue})`
        }))
    )
</script>
</html>
